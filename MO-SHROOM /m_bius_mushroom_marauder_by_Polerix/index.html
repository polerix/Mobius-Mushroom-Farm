<html>
<head>
  <title>Möbius Mushroom Marauder</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; }
    canvas { display: block; }
    #ui {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      color: white;
      font-family: 'Courier New', Courier, monospace;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      box-sizing: border-box;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0));
    }
    #energy-display, #train-cars-display {
        font-size: 24px;
        text-shadow: 2px 2px 4px #ff00ff;
    }
    #info {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        color: white;
        font-family: 'Courier New', Courier, monospace;
        font-size: 16px;
        text-align: center;
        background-color: rgba(0,0,0,0.5);
        padding: 10px;
        border-radius: 5px;
    }
    #upgrade-button {
        position: absolute;
        bottom: 60px;
        left: 50%;
        transform: translateX(-50%);
        padding: 15px 30px;
        font-size: 20px;
        font-family: 'Courier New', Courier, monospace;
        background-color: #0a0;
        color: white;
        border: 2px solid #0f0;
        border-radius: 5px;
        cursor: pointer;
        display: none; /* Hidden by default */
        box-shadow: 0 0 15px #0f0;
    }
     #upgrade-button:hover {
        background-color: #0c0;
     }
  </style>
</head>
<body>
  <div id="ui">
    <div id="energy-display">Energy: 0</div>
    <div id="train-cars-display">Health (Cars): 1</div>
  </div>
  <div id="info">
      Move mouse to aim. Click to shoot.<br>
      Collect energy from glowing mushrooms to grow your train.
  </div>
  <button id="upgrade-button">Grow Train (Cost: 100)</button>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.163.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.163.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
